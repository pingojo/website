{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% block seo_header %}
    <title>Pingojo - Crowd-Powered Hiring</title>
    <meta name="description" content="Pingojo is a revolutionary virtual recruitment platform that connects job seekers, recruiters, and companies, empowering anyone to become a recruiter. Our advanced contact management system and real-time dashboards help users stay updated and maintain their privacy.">
    <meta name="keywords" content="Pingojo, recruitment platform, job seekers, recruiters, companies, job matching, virtual recruitment, contact management, real-time dashboard">
    {% endblock %}
   
    <!-- Add these to the head section of your base.html -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>


    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.0/css/all.min.css" 
     crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>
<body>
    <header>
        <h1><a href="/" style="color: white; text-decoration: none;">pingojo</a> - Crowd-Powered Hiring</h1>
        <div class="search-bar">
            <form method="get" action="{% url 'search' %}">
                <input type="search" name="search" placeholder="Search jobs...">
                <button type="submit" style="display: none;"></button>
            </form>
        </div>
    </header>
    {% block content %}
    {% endblock %}
    
    <footer>
        &copy; Pingojo - All Rights Reserved |
        <a href="{% url 'privacy_policy' %}">Privacy Policy</a> |
        <a href="{% url 'terms_of_service' %}">Terms of Service</a> |
        <a href="https://github.com/pingojo/website">Github</a>
    </footer>
    

</body>
</html>
